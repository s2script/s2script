services:
  cs2:
    image: joedwards32/cs2
    container_name: s2script-cs2
    stdin_open: true
    tty: true
    environment:
      # Confirmed from image env (STEAMAPPDIR=/home/steam/cs2-dedicated)
      CS2_SERVERNAME: "s2script-slice0"
      CS2_LAN: "1"           # LAN mode — no SRCDS_TOKEN required
      CS2_RCONPW: "s2script"
      CS2_PORT: "27015"
      CS2_MAXPLAYERS: "12"  # Slice 6.6: bumped 2->12 so combat-dependent gates (damage hooks) can field a real firefight
      S2_DAMAGE_SELFTEST: "1"  # dev-only: opt in to the synthetic damage self-test (default OFF in production)
      CS2_GAMETYPE: "0"
      CS2_GAMEMODE: "1"
      CS2_STARTMAP: "de_inferno"
      SRCDS_TOKEN: ""
    ports:
      - "27015:27015/udp"
      - "27015:27015/tcp"
    volumes:
      # Persistent CS2 install (downloaded on first start, ~30 GB)
      - ./cs2-data:/home/steam/cs2-dedicated

      # s2script addon (our plugin + core SO). :ro blocks CONTAINER writes; the host can still
      # drop/remove .s2sp into dist/addons/s2script/plugins/ during the live gate (the mount
      # reflects host FS changes, and the shim only READS the plugins dir).
      - ../dist/addons/s2script:/home/steam/cs2-dedicated/game/csgo/addons/s2script:ro

      # Config override files (Slice 5E.2). A nested RW mount layered over the :ro addon above:
      # the shim AUTO-GENERATES addons/s2script/configs/<id>.json on first load and admins edit it
      # for live-reload — both need CONTAINER writes, which the :ro parent forbids. Docker resolves
      # nested mounts by longest target path, so this rw configs dir overlays the read-only addon.
      - ../dist/addons/s2script/configs:/home/steam/cs2-dedicated/game/csgo/addons/s2script/configs

      # SQLite databases (Slice DB). Same nested-RW pattern as configs/ above: @s2script/db
      # creates addons/s2script/data/<name>.sqlite at runtime, which needs CONTAINER writes the
      # :ro addon parent forbids. Overlays the read-only addon by longest-target-path resolution.
      - ../dist/addons/s2script/data:/home/steam/cs2-dedicated/game/csgo/addons/s2script/data

      # Metamod:Source itself — operator must pre-install into docker/metamod/.
      # scripts/package-addon.sh also places s2script.vdf here, so a single
      # dir mount is sufficient.
      # See "Docker verification runbook" in README.md for how to obtain MM:S.
      - ./metamod:/home/steam/cs2-dedicated/game/csgo/addons/metamod

      # gameinfo.gi patcher script — invoked automatically by pre.sh on every boot.
      - ./patch-gameinfo.sh:/patch-gameinfo.sh:ro

      # Boot hook: entry.sh sources pre.sh AFTER its steamcmd app_update and BEFORE srcds
      # starts, so this re-patches the Metamod SearchPath that a CS2 update wipes — retiring
      # the manual `docker exec s2script-cs2 /patch-gameinfo.sh` step. Nested inside the
      # cs2-data mount above; Docker resolves by longest target path (same trick as configs/).
      - ./pre.sh:/home/steam/cs2-dedicated/pre.sh:ro

  # Remote SQL driver live-gate sidecars (@s2script/db). Same default compose network as cs2,
  # so cs2 reaches them by service name (mysql/postgres) — no custom network needed.
  mysql:
    image: mysql:8
    container_name: s2script-mysql
    environment:
      MYSQL_ROOT_PASSWORD: s2root
      MYSQL_DATABASE: stats
      MYSQL_USER: cs2
      MYSQL_PASSWORD: s2pass
    # NOTE: no --default-authentication-plugin flag — it was REMOVED in MySQL 8.4 (mysql:8 now pulls
    # 8.4) and caching_sha2_password is already the default there; passing it aborts init.
  postgres:
    image: postgres:16
    container_name: s2script-postgres
    environment:
      POSTGRES_DB: prefs
      POSTGRES_USER: cs2
      POSTGRES_PASSWORD: s2pass
