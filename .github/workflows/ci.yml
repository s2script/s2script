name: ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The `changes` job runs dorny/paths-filter, which on a pull_request calls the GitHub
# "list PR files" API — that needs pull-requests:read. checkout needs contents:read.
# Declaring permissions at the workflow level narrows GITHUB_TOKEN to exactly these and
# applies to every job here (and to the called _build.yml, which only needs contents:read).
# Without this block the default token is contents-only and paths-filter fails with
# "Resource not accessible by integration", collapsing `changes` and the `ci-ok` gate.
permissions:
  contents: read
  pull-requests: read

jobs:
  # Path-filters which of the expensive jobs actually need to run. 'deps' (the
  # lockfile guard) deliberately has NO filter below and always runs — it is the
  # current required status check and must never go missing on a path-filtered PR.
  changes:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
      js: ${{ steps.filter.outputs.js }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'core/**'
              - 'shim/**'
              - 'Cargo.*'
              - 'third_party/**'
              - 'gamedata/**'
              - 'games/**'
            js:
              - 'plugins/**'
              - 'packages/**'
              - 'examples/**'
              - 'disabled/**'
              - 'plugins/disabled/**'
            website:
              - 'website/**'
              - 'scripts/website-*.sh'
              - 'scripts/configure-storage.sh'

  build:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      profile: debug
      core_lib_dir: debug

  # Guards against package-lock.json drifting out of sync with the workspace
  # package.json files — e.g. a new packages/* added (or a version bumped)
  # without regenerating the lockfile. This runs the SAME `npm ci` the
  # changesets release pipeline (changesets.yml) runs on main, so drift fails
  # HERE on the PR instead of after merge, where it silently breaks the release
  # workflow. Same Node/npm as changesets.yml so the two can never disagree.
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: npm ci (package-lock.json in sync)
        run: npm ci

  # The full JS/TS gate suite: codegen freshness (schema/nav/events/csitem — each
  # regenerates and diffs against the committed output) + the 5E.1 plugin/example
  # typecheck gate + the core-boundary name-leak self-test. Globbed so a future
  # check-*-generated.sh script needs no CI edit to start running here.
  gates-node:
    needs: changes
    if: needs.changes.outputs.js == 'true' || needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: npm ci
        run: npm ci
      - name: codegen freshness (glob check-*-generated.sh)
        run: |
          set -e
          for f in scripts/check-*-generated.sh; do echo "== $f =="; bash "$f"; done
      - name: plugin/example typecheck (5E.1 gate)
        run: bash ./scripts/check-plugins-typecheck.sh
      - name: core-boundary name-leak self-test
        run: bash ./scripts/test-boundary-nameleak.sh

  # Rust-side gate: core must never import games/* (the game→core dependency
  # direction is enforced here, cheaply, without a full shim build).
  gates-rust:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: core boundary check
        run: ./scripts/check-core-boundary.sh

  website:
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: npm ci
        run: npm ci
      - name: generated binding types are current
        run: npm run typegen && git diff --exit-code
      - name: typecheck
        run: npm run check
        env: &website-build-env
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          ORIGIN: https://s2script.com
          ENVIRONMENT: production
          AUTH_SECRET: ci-only-secret-at-least-32-characters
      - name: Unit tests
        run: npm test
        env: *website-build-env
      - name: production build
        run: npm run build
        env: *website-build-env

  # Fail-closed aggregator: the ONE required check a future branch-protection flip
  # points at instead of the individual (now path-filtered, sometimes-skipped) jobs.
  # 'if: always()' makes it run even when an upstream job is skipped by the path
  # filter — a skipped result is fine (nothing needed that job); a failure or
  # cancellation is not.
  ci-ok:
    needs: [changes, build, gates-node, gates-rust, website, deps]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "results: $results"
          case "$results" in *failure*|*cancelled*) echo "required job failed/cancelled"; exit 1 ;; esac
          echo ok
