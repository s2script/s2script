name: _build

# Reusable core+shim build, shared by ci.yml (cheap debug PR build) and
# release.yml (fail-fast release-profile sanity check ahead of the heavier
# bullseye Docker sniper build, which remains release.yml's own step — this
# workflow never produces the shipped GLIBC-2.31 binaries).
on:
  workflow_call:
    inputs:
      profile:
        description: "cargo build profile: 'debug' or 'release'"
        required: true
        type: string
      core_lib_dir:
        description: "target/<dir> the shim links libs2script_core.so from — matches profile"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: |
          if [ "${{ inputs.profile }}" = "release" ]; then
            cargo build --release
          else
            cargo build
          fi
      - name: cargo test
        run: cargo test -p s2script-core
      - name: core boundary check
        run: ./scripts/check-core-boundary.sh
      - uses: hendrikmuhs/ccache-action@v1
      - name: build shim
        run: |
          cmake -S shim -B build/shim -DCMAKE_BUILD_TYPE=Release \
            -DS2_CORE_LIB_DIR=${{ inputs.core_lib_dir }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build/shim -j
