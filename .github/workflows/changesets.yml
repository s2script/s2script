name: changesets

# Version + publish @s2script/* packages under packages/ to npm via
# npm trusted publishing (OIDC) — no long-lived NPM_TOKEN.
# Independent of the v* GitHub Release zip (release.yml) — plugin-only
# updates do not need a changeset; package-only updates do not need a tag.
#
# Prerequisite (one-time, per package on npmjs.com): configure a Trusted
# Publisher → GitHub Actions → GabeHirakawa / s2script / changesets.yml
# (packages must already exist on npm — see docs/INSTALL.md bootstrap).
on:
  push:
    branches:
      - main
    # Only run the version/publish pipeline when there is version-relevant work:
    # a new changeset (a feature PR merge -> opens the "version packages" PR) or a
    # package bump (the "version packages" PR merge -> publishes). A push that touches
    # neither (docs, core, a base plugin, a non-packages slice) has nothing to publish —
    # running `changeset publish` there just re-attempts already-published versions and
    # fails with "cannot publish over the previously published versions".
    paths:
      - 'packages/**'
      - '.changeset/**'
  # Manual recovery lever: re-run the version/publish pipeline on demand. Needed
  # when a push that carried an unconsumed changeset failed before changesets ran
  # (e.g. an out-of-sync package-lock.json broke the `npm ci` step) — the paths
  # filter won't re-fire on the fixup commit, so dispatch it here to open the
  # pending "version packages" PR once main is healthy again.
  workflow_dispatch: {}

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  # Required for npm OIDC trusted publishing (short-lived identity token)
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Changesets needs full history for changelogs / base comparison
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node >= 22.14 and npm >= 11.5.1
          node-version: "22"
          cache: npm
          # NOTE: intentionally NO `registry-url`. Under OIDC there is no
          # NODE_AUTH_TOKEN, so setup-node's registry-url only wrote a user
          # .npmrc holding an empty `_authToken=` line plus the deprecated
          # `always-auth` key (npm 11 warns; removed in npm 12). npm defaults to
          # registry.npmjs.org and changesets/action manages the OIDC .npmrc,
          # so trusted publishing works without it.

      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Attach build provenance (a signed supply-chain attestation) to each
          # publish. Requires id-token: write (granted above) + npm >= 9.5.
          NPM_CONFIG_PROVENANCE: "true"
          # Intentionally no NPM_TOKEN / NODE_AUTH_TOKEN — publish uses OIDC.
          # changesets/action detects ACTIONS_ID_TOKEN_* and skips writing an
          # auth .npmrc so npm CLI can use trusted publishing.
